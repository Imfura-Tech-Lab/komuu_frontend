name: Deploy to Production

on:
  push:
    branches: [production]
  workflow_dispatch:

env:
  IMAGE_NAME: komuu-frontend
  IMAGE_TAG: production-${{ github.sha }}
  DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
  DROPLET_USER: ${{ secrets.DROPLET_USER }}
  CONTAINER_NAME: nextjs-production
  BACKEND_URL: https://api.komuu.com/api/v1/
  VERIFICATION_BASE_URL: https://komuu.com
  SSH_PORT: 2222
  DOCKER_NETWORK: komuu

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Next.js version (CVE-2025-55182 mitigation)
        run: |
          NEXT_VERSION=$(node -p "require('./package-lock.json').packages['node_modules/next'].version" 2>/dev/null || echo "unknown")
          echo "Next.js version: $NEXT_VERSION"
          if [[ "$NEXT_VERSION" =~ ^15\.[0-4]\. ]] || [[ "$NEXT_VERSION" =~ ^15\.5\.[0-6]$ ]]; then
            echo "VULNERABLE Next.js version detected: $NEXT_VERSION"
            exit 1
          fi
          echo "Next.js version $NEXT_VERSION is patched"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_BACKEND_API_URL=${{ env.BACKEND_URL }}
            NEXT_PUBLIC_VERIFICATION_BASE_URL=${{ env.VERIFICATION_BASE_URL }}
            NODE_ENV=production

      - name: Save Docker image
        run: |
          docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} | gzip > image.tar.gz
          ls -lh image.tar.gz

      - name: Transfer image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DROPLET_HOST }}
          username: ${{ env.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT }}
          source: "image.tar.gz"
          target: "/tmp"

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.DROPLET_HOST }}
          username: ${{ env.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail

            IMAGE="${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
            CONTAINER="${{ env.CONTAINER_NAME }}"
            PREVIOUS_IMAGE=""

            echo "Starting production deployment..."

            if docker inspect "$CONTAINER" &>/dev/null; then
              PREVIOUS_IMAGE=$(docker inspect --format='{{.Config.Image}}' "$CONTAINER" 2>/dev/null || true)
              echo "Previous image: $PREVIOUS_IMAGE"
            fi

            echo "Loading Docker image..."
            gunzip -c /tmp/image.tar.gz | docker load
            rm -f /tmp/image.tar.gz

            docker network create ${{ env.DOCKER_NETWORK }} 2>/dev/null || true

            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm "$CONTAINER" 2>/dev/null || true

            echo "Starting new container..."
            docker run -d \
              --name "$CONTAINER" \
              --network ${{ env.DOCKER_NETWORK }} \
              -e NODE_ENV=production \
              --restart unless-stopped \
              --log-driver json-file \
              --log-opt max-size=10m \
              --log-opt max-file=3 \
              --memory=512m \
              --cpus=1 \
              "$IMAGE"

            echo "Waiting for Next.js to be ready..."
            MAX_RETRIES=24
            RETRY_INTERVAL=5

            for i in $(seq 1 $MAX_RETRIES); do
              if docker logs "$CONTAINER" 2>&1 | grep -q "Ready in"; then
                echo "Health check passed on attempt $i"
                break
              fi

              if [ $i -eq $MAX_RETRIES ]; then
                echo "Health check failed after $MAX_RETRIES attempts"
                docker logs --tail 100 "$CONTAINER"

                if [ -n "$PREVIOUS_IMAGE" ] && [ "$PREVIOUS_IMAGE" != "$IMAGE" ]; then
                  echo "Rolling back to $PREVIOUS_IMAGE"
                  docker stop "$CONTAINER" 2>/dev/null || true
                  docker rm "$CONTAINER" 2>/dev/null || true
                  docker run -d \
                    --name "$CONTAINER" \
                    --network ${{ env.DOCKER_NETWORK }} \
                    -e NODE_ENV=production \
                    --restart unless-stopped \
                    "$PREVIOUS_IMAGE"
                  echo "Rolled back to previous version"
                fi
                exit 1
              fi

              echo "Attempt $i/$MAX_RETRIES: Next.js not ready yet, retrying in ${RETRY_INTERVAL}s..."
              sleep $RETRY_INTERVAL
            done

            docker image prune -f
            echo "Production deployment completed successfully"

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Network:** komuu (internal only)" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Transfer:** Direct (no registry)" >> $GITHUB_STEP_SUMMARY
